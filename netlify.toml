[build]
  command = "npm run build"
  publish = ".next"

# ============================================
# REQUIRED ENVIRONMENT VARIABLES
# Set these in Netlify Dashboard → Site configuration → Environment variables
# (Never commit real values)
# ============================================

[build.environment]
  # Email (Resend)
  # RESEND_API_KEY=

  # Telegram alerts
  # TELEGRAM_BOT_TOKEN=
  # TELEGRAM_CHAT_ID=

  # HubSpot CRM
  # HUBSPOT_PRIVATE_APP_TOKEN=

  # OpenPhone SMS
  # OPENPHONE_API_KEY=
  # OPENPHONE_PHONE_NUMBER_ID=   # ID of the phone number to send from (get from OpenPhone)

# Netlify will auto-install the Next.js plugin for full SSR + API support.
# If you want to pin it explicitly, uncomment below:
# [[plugins]]
#   package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================
# Environment Variables for Lead Pipeline
# Set these in Netlify UI (Site configuration > Environment variables)
# Do NOT commit real values here.
# ============================================
# RESEND_API_KEY=                 # For sending lead emails via Resend
# TELEGRAM_BOT_TOKEN=             # Telegram bot token
# TELEGRAM_CHAT_ID=               # Chat ID to receive Telegram alerts
# HUBSPOT_PRIVATE_APP_TOKEN=      # HubSpot private app token for CRM
# OPENPHONE_API_KEY=              # OpenPhone API key
# OPENPHONE_PHONE_NUMBER_ID=      # OpenPhone phone number ID for SMS

