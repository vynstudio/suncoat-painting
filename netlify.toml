[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"  # Next.js 15+ requires Node >= 18.18; 20 recommended
  # NOTE: Real secret values (below) must be set in the Netlify UI (Site configuration > Environment variables)
  # Do not put real keys here.

# Netlify will auto-install the Next.js plugin for full SSR + API support.
# If you want to pin it explicitly, uncomment below:
# [[plugins]]
#   package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.resend.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests; worker-src 'self' blob:;"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================
# Environment Variables for Lead Pipeline
# Set these in Netlify UI (Site configuration > Environment variables)
# Do NOT commit real values here.
# ============================================
# RESEND_API_KEY=                 # For sending lead emails via Resend
# TELEGRAM_BOT_TOKEN=             # Telegram bot token
# TELEGRAM_CHAT_ID=               # Chat ID to receive Telegram alerts
# HUBSPOT_PRIVATE_APP_TOKEN=      # HubSpot private app token for CRM
# OPENPHONE_API_KEY=              # OpenPhone API key
# OPENPHONE_PHONE_NUMBER_ID=      # OpenPhone phone number ID for SMS

